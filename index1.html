<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AyaanOS Terminal</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;800&display=swap" rel="stylesheet">
<style>
:root{
--bg:#070b10;
--panel:#0e141b;
--accent:#ff751f;
--accent-soft:#ff9a4d;
--text:#e6edf3;
--muted:#5c6b7a;
--glow:rgba(255,117,31,.35);
}
.light{
--bg:#f3f6fa;
--panel:#ffffff;
--accent:#ff751f;
--accent-soft:#ff8c3a;
--text:#0d1117;
--muted:#6b7280;
--glow:rgba(255,117,31,.2);
}
*{margin:0;padding:0;box-sizing:border-box}
body{
background:var(--bg);
font-family:"JetBrains Mono",monospace;
height:100vh;
display:flex;
align-items:center;
justify-content:center;
color:var(--text);
overflow:hidden;
transition:background .3s ease;
}
.terminal{
width:95%;
max-width:1100px;
height:90vh;
background:rgba(15,20,27,.9);
backdrop-filter:blur(20px);
border-radius:22px;
box-shadow:0 0 80px var(--glow);
display:flex;
flex-direction:column;
overflow:hidden;
border:1px solid rgba(255,255,255,.05);
}
.topbar{
display:flex;
justify-content:space-between;
padding:16px 22px;
border-bottom:1px solid rgba(255,255,255,.05);
font-size:14px;
color:var(--muted);
}
.actions{display:flex;gap:10px}
.btn{
font-size:12px;
padding:6px 12px;
border-radius:20px;
border:1px solid rgba(255,255,255,.08);
cursor:pointer;
}
.btn:hover{color:var(--accent);border-color:var(--accent)}
.buffer{
flex:1;
padding:28px;
overflow-y:auto;
white-space:pre;
font-size:14px;
line-height:1.4;
}
.line{margin-bottom:4px;animation:fade .2s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.command{color:var(--accent-soft)}
.response{color:var(--text)}
.muted{color:var(--muted)}
.banner{color:var(--accent)}
.input-area{
display:flex;
align-items:center;
padding:18px 28px;
border-top:1px solid rgba(255,255,255,.05);
}
.prompt{color:var(--accent);margin-right:10px}
input{
flex:1;
background:transparent;
border:none;
outline:none;
font-family:"JetBrains Mono",monospace;
font-size:14px;
color:var(--text);
}
</style>
</head>
<body>

<div class="terminal">
<div class="topbar">
<div>ayaanos://terminal</div>
<div class="actions">
<div class="btn" id="themeBtn">theme</div>
<div class="btn" id="clearBtn">clear</div>
</div>
</div>

<div class="buffer" id="buffer"></div>

<div class="input-area">
<div class="prompt">></div>
<input id="input" autocomplete="off" autofocus>
</div>
</div>

<script>
const buffer=document.getElementById("buffer")
const input=document.getElementById("input")
const themeBtn=document.getElementById("themeBtn")
const clearBtn=document.getElementById("clearBtn")

const banner=`
 █████╗ ██╗   ██╗ █████╗  █████╗ ███╗   ██╗
██╔══██╗╚██╗ ██╔╝██╔══██╗██╔══██╗████╗  ██║
███████║ ╚████╔╝ ███████║███████║██╔██╗ ██║
██╔══██║  ╚██╔╝  ██╔══██║██╔══██║██║╚██╗██║
██║  ██║   ██║   ██║  ██║██║  ██║██║ ╚████║
╚═╝  ╚═╝   ╚═╝   ╚═╝  ╚═╝╚═╝  ╚═╝╚═╝  ╚═══╝
`

const intro=`
AyaanOS Web Terminal v1.0
Simulation Layer Active
Type 'help' to view commands.
`

function addLine(text,cls="response"){
const div=document.createElement("div")
div.className="line "+cls
div.textContent=text
buffer.appendChild(div)
buffer.scrollTop=buffer.scrollHeight
}

function printBlock(text,cls="response"){
text.split("\n").forEach(l=>addLine(l,cls))
}

function boot(){
printBlock(banner,"banner")
addLine("")
printBlock(intro,"muted")
addLine("")
}

boot()

const fileSystem={
"/": ["core","apps","logs"],
"/core": ["kernel.sys","memory.cfg"],
"/apps": ["clock.app","matrix.app","calc.app"],
"/logs": ["system.log"]
}

const commands={
help:()=>`
help        list commands
ls          list directory
cd [dir]    change directory
run [app]   launch app
echo [msg]  print message
theme       toggle theme
clear       clear screen
`,
ls:()=>fileSystem[currentDir]?.join("  ") || "Directory empty.",
cd:(arg)=>{
if(!arg)return "Specify directory."
let path=arg.startsWith("/")?arg:currentDir+"/"+arg
if(fileSystem[path]){
currentDir=path
return "Entered "+path
}
return "Directory not found."
},
run:(arg)=>{
if(arg==="clock.app"){
return "Time: "+new Date().toLocaleTimeString()
}
if(arg==="matrix.app"){
startMatrix()
return ""
}
if(arg==="calc.app"){
return "Calculator ready. Use: calc 5+5"
}
return "App not found."
},
echo:(arg)=>arg||"",
calc:(arg)=>{
try{return eval(arg).toString()}
catch{return "Invalid expression."}
},
theme:()=>{
document.body.classList.toggle("light")
return "Theme switched."
},
clear:()=>{
buffer.innerHTML=""
boot()
return ""
}
}

let currentDir="/"
let history=[]
let index=0

input.addEventListener("keydown",e=>{
if(e.key==="Enter"){
const raw=input.value.trim()
if(!raw)return
addLine("> "+raw,"command")
history.push(raw)
index=history.length
const parts=raw.split(" ")
const cmd=parts[0]
const arg=parts.slice(1).join(" ")
if(commands[cmd]){
const result=commands[cmd](arg)
if(result)printBlock(result)
}else{
addLine("Unknown command.","muted")
}
input.value=""
}
if(e.key==="ArrowUp"){
if(index>0){index--;input.value=history[index]}
}
if(e.key==="ArrowDown"){
if(index<history.length-1){index++;input.value=history[index]}
else{index=history.length;input.value=""}
}
})

function startMatrix(){
let i=0
const interval=setInterval(()=>{
addLine(Math.random().toString(36).substring(2,15),"muted")
i++
if(i>20)clearInterval(interval)
},50)
}

themeBtn.onclick=()=>commands.theme()
clearBtn.onclick=()=>commands.clear()
</script>

</body>
</html>
